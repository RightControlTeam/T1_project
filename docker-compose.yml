version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: reserve_postgres
    ports:
      - "5432:5432"
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reserve_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    container_name: reserve_backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - reserve_network
  frontend:
    container_name: reserve_frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3005:80"
    volumes:
     - ./frontend:/app
     - /app/node_modules
    networks:
      - reserve_network
networks:
  reserve_network:
    name: reserve_network
    driver: bridge
volumes:
  postgres_data:
    name: reserve_postgres_data